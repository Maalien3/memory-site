<!DOCTYPE html>
<html>
<head>
    <title>Our Memories ❤️</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            margin: 0;
            text-align: center;
        }

        h1 {
            color: white;
            padding: 20px;
        }

        .box {
            background: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        img {
            width: 200px;
            border-radius: 10px;
            margin: 10px;
        }

        /* Hearts */
        .heart {
            position: fixed;
            top: -10px;
            font-size: 20px;
            animation: fall 5s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>

<body>

<script>
let pass = prompt("Enter password ❤️");
if(pass !== "love123"){
    document.body.innerHTML = "Access Denied";
}
</script>

<h1>Our Memories ❤️</h1>

<div class="box">
    <h2>Our Story 💕</h2>
    <p>Write your story here...</p>
</div>

<div class="box">
    <h2>Our Photos 📸</h2>
    <img src="pic1.jpg">
    <img src="pic2.jpg">
</div>

<div class="box">
    <h2>Special Messages 💌</h2>
    <p>You mean everything to me ❤️</p>
</div>

<script>
// Hearts (safe version)
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 800);
</script>

</body>
</html>
